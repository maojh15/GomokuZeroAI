<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GomokuZero 人机对战</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="sidebar" aria-label="game controls">
        <div class="brand">
          <span class="mark"></span>
          <div>
            <h1>GomokuZero</h1>
            <p>人机对战</p>
          </div>
        </div>

        <label class="field">
          <span>Checkpoint</span>
          <select id="checkpointSelect"></select>
        </label>

        <div class="field">
          <span>执子</span>
          <div class="segmented" role="group" aria-label="human side">
            <button class="active" id="sideBlack" type="button">黑棋先手</button>
            <button id="sideWhite" type="button">白棋后手</button>
          </div>
        </div>

        <label class="field">
          <span>MCTS playouts</span>
          <input id="playoutsInput" type="number" min="1" max="3000" step="1" value="2000" />
        </label>

        <label class="field">
          <span>c_puct</span>
          <input id="cPuctInput" type="number" min="0.1" max="20" step="0.1" value="5.0" />
        </label>

        <label class="field">
          <span>candidate distance</span>
          <input id="candidateDistanceInput" type="number" min="0" max="15" step="1" placeholder="empty = all legal" />
        </label>

        <label class="checkField">
          <input id="tacticalShortcutsInput" type="checkbox" checked />
          <span>mcts_tactical_shortcuts</span>
        </label>

        <button class="primary" id="newGameBtn" type="button">开始新局</button>

        <div class="debugBox">
          <label class="checkField">
            <input id="debugModeInput" type="checkbox" />
            <span>Debug 摆盘模式</span>
          </label>

          <div class="field debugControls">
            <span>摆子工具</span>
            <div class="segmented three" role="group" aria-label="debug stone tool">
              <button class="active" id="paintBlack" type="button">黑</button>
              <button id="paintWhite" type="button">白</button>
              <button id="paintEmpty" type="button">清除</button>
            </div>
          </div>

          <div class="field debugControls">
            <span>网络评估方</span>
            <div class="segmented" role="group" aria-label="debug evaluate player">
              <button class="active" id="evalBlack" type="button">黑棋</button>
              <button id="evalWhite" type="button">白棋</button>
            </div>
          </div>

          <button class="secondary debugControls" id="debugPredictBtn" type="button">检测网络输出</button>
        </div>

        <div class="status">
          <span id="statusDot" class="dot"></span>
          <div>
            <strong id="statusTitle">正在载入 checkpoint...</strong>
            <p id="statusText">请稍等</p>
          </div>
        </div>
      </section>

      <section class="table" aria-label="gomoku board">
        <div class="topbar">
          <div>
            <span class="eyebrow">当前模型</span>
            <strong id="modelName">未选择</strong>
          </div>
          <div class="legend" aria-label="stone legend">
            <span><i class="stone black small"></i>黑</span>
            <span><i class="stone white small"></i>白</span>
            <button id="hintToggle" class="toggle" type="button" aria-pressed="false">Hint</button>
            <button id="policyToggle" class="toggle" type="button" aria-pressed="false">Policy</button>
            <button id="visitsToggle" class="toggle" type="button" aria-pressed="false">Visits</button>
          </div>
        </div>
        <div class="boardStage">
          <div class="boardPanel">
            <div class="panelTitle">
              <strong>对局棋盘</strong>
              <span class="titleMetrics">
                <span id="lastMoveLabel" class="metric moveMetric">等待开局</span>
                <span id="moveCountLabel" class="metric countMetric"></span>
                <span id="valueSummary" class="metric valueMetric"></span>
                <span id="selectedMoveSummary" class="metric selectedMetric"></span>
                <span id="policySummary" class="metric policyMetric"></span>
                <span id="visitsSummary" class="metric visitsMetric"></span>
              </span>
            </div>
            <div class="boardWrap">
              <div id="board" class="board" role="grid" aria-label="棋盘"></div>
            </div>
            <div id="overlayHelp" class="overlayHelp" hidden></div>
          </div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
